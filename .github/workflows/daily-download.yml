name: Daily Download Agent

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date YYYY-MM-DD (blank = yesterday)'
        required: false
        default: ''
      dry_run:
        description: 'Skip upload to Supabase (download + parse only)'
        type: boolean
        default: false
  schedule:
    - cron: '3 3 * * *'  # 03:03 UTC = 10:03 Vietnam time

concurrency:
  group: daily-download-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EAT365_LOGIN_EMAIL: ${{ secrets.EAT365_LOGIN_EMAIL }}
      EAT365_LOGIN_PASSWORD: ${{ secrets.EAT365_LOGIN_PASSWORD }}
      OCARD_LOGIN_EMAIL: ${{ secrets.OCARD_LOGIN_EMAIL }}
      OCARD_LOGIN_PASSWORD: ${{ secrets.OCARD_LOGIN_PASSWORD }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
      GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }}
      AGENT_UPLOAD_BASE_URL: ${{ secrets.AGENT_UPLOAD_BASE_URL }}
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agents/download-agent/package-lock.json

      - name: Install agent deps
        working-directory: agents/download-agent
        run: npm ci

      - name: Install Chrome + Playwright browsers + xvfb
        working-directory: agents/download-agent
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npx playwright install --with-deps chromium
          npx playwright install chrome

      - name: Restore eat365 session cache
        id: session-cache
        uses: actions/cache/restore@v4
        with:
          path: agents/download-agent/eat365-session.json
          key: eat365-session-v1
          restore-keys: |
            eat365-session-

      - name: Run agent (xvfb for headful eat365 login)
        working-directory: agents/download-agent
        run: xvfb-run -a npx tsx index.ts ${{ inputs.target_date }}

      - name: Save eat365 session cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: agents/download-agent/eat365-session.json
          key: eat365-session-v1-${{ github.run_id }}

      # Weather sync: in-process node-cron in instrumentation.ts is unreliable on
      # Zeabur (only fires while the Next.js process is alive). Drive it from CI
      # instead. The script talks directly to Supabase via service role +
      # Open-Meteo — no Next.js API hop, so it works even if the deploy is
      # asleep or AGENT_UPLOAD_BASE_URL is unset. Idempotent (upsert on
      # store_id,date) over a 7-day window so missed days self-heal.
      - name: Install root deps (for weather sync)
        if: always()
        run: npm ci

      - name: Sync weather (last 7 days, idempotent)
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/sync_weather.ts || echo "::warning::weather sync failed (non-fatal)"

      # Reviews sync: same Zeabur reliability problem as weather — the weekly
      # node-cron in scripts/scheduler.ts only fires while the Next.js process
      # is alive, so weeks get silently skipped. Drive it from CI daily so
      # reviews stay fresh; incremental + upsert means any missed day self-heals.
      - name: Sync Google reviews (incremental, idempotent)
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
        run: npx tsx scripts/sync_reviews.ts || echo "::warning::reviews sync failed (non-fatal)"

      # Anomaly detection runs here (after data + weather are loaded) instead of
      # in the Zeabur node-cron scheduler, which fires before the daily download
      # has run and is unreliable on Zeabur restarts. Non-fatal so a flaky
      # endpoint doesn't fail the whole pipeline.
      - name: Detect anomalies
        if: always()
        run: |
          echo "POST to ${AGENT_UPLOAD_BASE_URL}/api/alerts/detect"
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${AGENT_UPLOAD_BASE_URL}/api/alerts/detect" \
            --max-time 120) || true
          status=$(echo "$response" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          body=$(echo "$response" | sed '/HTTP_STATUS:/d')
          echo "Response body: $body"
          echo "HTTP status: $status"
          if [ "$status" != "200" ]; then
            echo "::warning::anomaly detection returned $status (non-fatal)"
          fi

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-${{ github.run_id }}
          path: |
            agents/download-agent/downloads/
            agents/download-agent/debug_*.png
            agents/download-agent/debug_*.txt
          retention-days: 3
          if-no-files-found: ignore
