name: Daily Download Agent

on:
  workflow_dispatch:
    inputs:
      ipos_days:
        description: 'Days to backfill from iPOS (default 30)'
        required: false
        default: '30'
      ipos_store_id:
        description: 'Optional store_id to scrape only (blank = all iPOS-configured stores)'
        required: false
        default: ''
  schedule:
    - cron: '3 3 * * *'  # 03:03 UTC = 10:03 Vietnam time

concurrency:
  group: daily-download-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AGENT_UPLOAD_BASE_URL: ${{ secrets.AGENT_UPLOAD_BASE_URL }}
      IPOS_DAYS: ${{ inputs.ipos_days || '30' }}
      IPOS_STORE_ID: ${{ inputs.ipos_store_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agents/download-agent/package-lock.json

      # Root deps must be installed BEFORE the iPOS scrape — the scraper imports
      # parseIposUpload from ../../lib/parsers/ipos, which transitively requires
      # `xlsx` from the parent project's node_modules (the agent's own xlsx is at
      # agents/download-agent/node_modules and isn't visible to a file under
      # lib/parsers/). Same install also serves the later sync_*.ts steps.
      - name: Install root deps (xlsx for parsers, supabase-js, etc.)
        run: npm ci

      - name: Install agent deps
        working-directory: agents/download-agent
        run: npm ci

      - name: Install Chromium for Playwright
        working-directory: agents/download-agent
        run: npx playwright install --with-deps chromium

      - name: Scrape iPOS (per-store credentials read from Supabase)
        working-directory: agents/download-agent
        run: npx tsx index.ts

      - name: Sync weather (last 30 days, idempotent)
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/sync_weather.ts || echo "::warning::weather sync failed (non-fatal)"

      # Reviews sync: same Zeabur reliability problem as weather — the weekly
      # node-cron in scripts/scheduler.ts only fires while the Next.js process
      # is alive, so weeks get silently skipped. Drive it from CI daily so
      # reviews stay fresh; incremental + upsert means any missed day self-heals.
      - name: Sync Google reviews (incremental, idempotent)
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
        run: npx tsx scripts/sync_reviews.ts || echo "::warning::reviews sync failed (non-fatal)"

      # Google sync (GSC + GA4): same Zeabur reliability problem as weather and
      # reviews — the 02:00 node-cron in scripts/scheduler.ts silently skips
      # whenever the Next.js process is asleep, restarted, or redeployed, which
      # is why digital marketing data kept lagging until someone hit "立即同步"
      # by hand. Drive it from CI daily; the script talks directly to Supabase
      # via service role + Google APIs (no Next.js API hop), with a 180-day
      # window so any missed day self-heals on the next run.
      - name: Sync Google (GSC + GA4, 180-day window, idempotent)
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: npx tsx scripts/google_sync_local.ts || echo "::warning::google sync failed (non-fatal)"

      # Anomaly detection runs here (after data + weather are loaded) instead of
      # in the Zeabur node-cron scheduler, which fires before the daily download
      # has run and is unreliable on Zeabur restarts. Non-fatal so a flaky
      # endpoint doesn't fail the whole pipeline.
      - name: Detect anomalies
        if: always()
        run: |
          echo "POST to ${AGENT_UPLOAD_BASE_URL}/api/alerts/detect"
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${AGENT_UPLOAD_BASE_URL}/api/alerts/detect" \
            --max-time 120) || true
          status=$(echo "$response" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          body=$(echo "$response" | sed '/HTTP_STATUS:/d')
          echo "Response body: $body"
          echo "HTTP status: $status"
          if [ "$status" != "200" ]; then
            echo "::warning::anomaly detection returned $status (non-fatal)"
          fi

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-${{ github.run_id }}
          path: |
            agents/download-agent/downloads/
          retention-days: 3
          if-no-files-found: ignore
