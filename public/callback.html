<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FnB Pulse — 驗證中</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { background: #fff; border-radius: 1rem; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 2rem; max-width: 22rem; width: 100%; text-align: center; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #0f172a; margin-bottom: .5rem; }
    .msg { font-size: .875rem; color: #64748b; }
    .err { font-size: .875rem; color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>FnB Pulse</h1>
    <p id="status" class="msg">驗證中，請稍候...</p>
  </div>
  <script>
    (async function() {
      var el = document.getElementById('status');
      try {
        var hash = window.location.hash.substring(1);
        var params = new URLSearchParams(hash);
        var accessToken = params.get('access_token');
        var refreshToken = params.get('refresh_token');
        var type = params.get('type');

        var query = new URLSearchParams(window.location.search);
        var queryType = query.get('type');
        var callbackType = type || queryType;

        if (!accessToken || !refreshToken) {
          el.className = 'err';
          el.textContent = '驗證失敗，正在返回登入頁...';
          setTimeout(function() { window.location.href = '/login?error=auth_failed'; }, 2000);
          return;
        }

        var supabase = window.supabase.createClient(
          'https://sqretgvldoqlrsrkecmw.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxcmV0Z3ZsZG9xbHJzcmtlY213Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDA5NjEsImV4cCI6MjA5MDYxNjk2MX0.MoRf0qI0nCm9bc6qfexf91ARKGdeRSPx-0Yk3O9n_cg'
        );

        var result = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken,
        });

        if (result.error) {
          el.className = 'err';
          el.textContent = '驗證失敗：' + result.error.message;
          setTimeout(function() { window.location.href = '/login?error=auth_failed'; }, 3000);
          return;
        }

        if (callbackType === 'invite' || callbackType === 'recovery') {
          window.location.href = '/set-password';
        } else {
          window.location.href = '/dashboard';
        }
      } catch (e) {
        el.className = 'err';
        el.textContent = '發生錯誤：' + e.message;
      }
    })();
  </script>
</body>
</html>
